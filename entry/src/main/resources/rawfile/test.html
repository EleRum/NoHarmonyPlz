<!DOCTYPE html>
<html><head><meta charset="utf-8"></head>
<body style="background:#2196F3;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;margin:0;color:white;font-family:sans-serif;">
  <h1 id="status" style="font-size:40px;">Loading AMap SDK...</h1>
  <p id="detail" style="font-size:20px;margin-top:20px;"></p>
</body>
<script>
var s = document.createElement('script');
s.src = 'https://webapi.amap.com/maps?v=2.0&key=bb0c1640992e6c7f2b1467498d8ae848&plugin=AMap.PlaceSearch,AMap.Geocoder,AMap.Geolocation';
s.onload = function() {
  document.getElementById('status').textContent = 'AMap SDK LOADED';
  document.body.style.background = '#4CAF50';
  try {
    var map = new AMap.Map(document.createElement('div'), { zoom: 10, center: [116, 39] });
    document.getElementById('detail').textContent = 'Map created: ' + (map ? 'OK' : 'FAIL');
    map.destroy();
  } catch(e) {
    document.getElementById('detail').textContent = 'Map create error: ' + e.message;
  }
};
s.onerror = function() {
  document.getElementById('status').textContent = 'AMap SDK FAILED';
  document.body.style.background = '#F44336';
  document.getElementById('detail').textContent = 'Script load error - network blocked or key invalid';
};
document.head.appendChild(s);
</script>
</html>
